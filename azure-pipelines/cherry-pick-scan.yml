trigger: none
pr: none

schedules:
- cron: "11 * * * *"
  branches:
    include:
    - main
  always: true

jobs:
- job: PRChecker
  pool: sonic-ubuntu-1c
  variables:
    - group: sonicbld
  timeoutInMinutes: 60
  steps:
    - checkout: self
    - script: |
        set -ex
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh jq -y

        echo $TOKEN | gh auth login --with-token
      env:
        TOKEN: $(GITHUB-TOKEN-TEST)
      displayName: install dependencies
    - script: |
        set -ex
        date_2m_ago=$(date --date "2 month ago" -u +"%FT%TZ")
        date_now=$(date -u +"%T")

        comment_watermark='<div align="right"><sub>---Powered by SONiC BuildBot</sub></div>'
        comment_pr() {
          local pr_url=$1
          local comment_body=$2
          local full_body=$(printf "%s\n\n%s" "$comment_body" "$comment_watermark")
          gh pr comment "$pr_url" --body "$full_body"
        }
        # repos="sonic-net/sonic-buildimage sonic-net/sonic-utilities sonic-net/sonic-swss sonic-net/sonic-sairedis sonic-net/sonic-swss-common sonic-net/sonic-dbsyncd sonic-net/sonic-gnmi sonic-net/sonic-host-services sonic-net/sonic-linkmgrd sonic-net/sonic-linux-kernel sonic-net/sonic-mgmt-common sonic-net/sonic-mgmt-framework sonic-net/sonic-platform-common sonic-net/sonic-platform-daemons sonic-net/sonic-py-swsssdk sonic-net/sonic-restapi sonic-net/sonic-snmpagent sonic-net/sonic-wpa-supplicant sonic-net/sonic-dhcp-relay sonic-net/sonic-dhcpmon sonic-net/sonic-dash-api sonic-net/sonic-dash-ha sonic-net/sonic-bmp sonic-net/sonic-ztp Azure/sonic-swss.msft Azure/sonic-sairedis.msft Azure/sonic-utilities.msft Azure/sonic-platform-daemons.msft Azure/sonic-platform-common.msft Azure/sonic-linux-kernel.msft Azure/SAI.msft Azure/sonic-buildimage-msft Azure/sonic-mgmt.msft Azure/sonic-swss-common.msft Azure/sonic-host-services.msft Azure/sonic-gnmi.msft Azure/sonic-dash-api.msft Azure/sonic-dash-ha.msft"
        repos="yijingyan2/sonic-buildimage"
        rm -rf cherry_pick_scan.log
        rc=0
          for repo in $repos $(EXTRA_REPOS); do
            echo ======== working for $repo ========
            echo ======= Result for $repo ====== >> cherry_pick_scan.log
            open_prs=$(gh pr list -R $repo --state open -L 150 --json url,labels,body,author,comments,updatedAt | jq -c --arg date_2m_ago "$date_2m_ago" '[.[] | select(.updatedAt >= $date_2m_ago and ((.author.login // "") != "mssonicbld"))]')
            merged_prs=$(gh pr list -R $repo --state merged -L 300 --json url,labels,body,author,comments,updatedAt | jq -c --arg date_2m_ago "$date_2m_ago" '[.[] | select(.updatedAt >= $date_2m_ago and ((.author.login // "") != "mssonicbld"))]')
            prs=$(jq -sc 'add | unique_by(.url)' <(echo "$open_prs") <(echo "$merged_prs"))
            c=$(echo $prs | jq length)
            for ((i=0; i<$c; i++)); do
              set +x
              pr=$(echo $prs | jq .[$i])
              url=$(echo $pr | jq .url -r)
              body=$(echo $pr | jq .body -r)
              body_no_comments=$(echo "$body" | awk 'BEGIN{in_comment=0} /<!--/{in_comment=1} !in_comment{print} /-->/{in_comment=0}')
              labels=$(echo $pr | jq .labels[].name -r)
              backport_branches=$(echo "$body_no_comments" | grep -oP '(?<=- \[x\] )\d{6}' || true)
              labels_to_add=""
              branches_to_add=""
              branches_already_added=""
              while IFS= read -r branch; do
                [[ -z "$branch" ]] && continue
                label="Request for $branch Branch"
                if echo "$labels" | grep -qF "$label"; then
                  branches_already_added="${branches_already_added:+$branches_already_added,}$branch"
                else
                  labels_to_add="${labels_to_add:+$labels_to_add,}$label"
                  branches_to_add="${branches_to_add:+$branches_to_add,}$branch"
                fi
              done <<< "$backport_branches"
              if [[ -n "$branches_to_add" ]]; then
                all_branches=$(echo "$backport_branches" | paste -sd ',' -)
                msg="This PR has backport request for branches: $all_branches."
                [[ -n "$branches_already_added" ]] && msg="$msg<br><br>Request label(s) for branch(es) $branches_already_added already exists."
                msg="$msg<br>Adding label(s) for branch(es) $branches_to_add."
                comment_pr "$url" "$msg"
                gh pr edit "$url" --add-label "$labels_to_add"
                echo "Added labels for branch(es) $branches_to_add for $url" >> cherry_pick_scan.log
              fi
              labels=$(gh pr view "$url" --json labels | jq -r '.labels[].name')
              pr_number=$(echo "$url" | grep -Eo '[0-9]+$')
              request_labels_created_by_bot=$(gh api "repos/$repo/issues/$pr_number/events?per_page=100" --paginate | jq -r '.[] | select(.event == "labeled" and (.actor.login // "") == "yijingyan2" and (.label.name // "" | test("^Request for [0-9]{6} Branch$"))) | .label.name' | sort -u)
              branches_with_request_label=$(echo "$labels" | grep -oP '(?<=Request for )\d{6}(?= Branch)' || true)
              labels_to_remove=""
              branches_to_remove=""
              for branch in $branches_with_request_label; do
                if ! echo "$backport_branches" | grep -qF "$branch"; then
                  label="Request for $branch Branch"
                  if echo "$request_labels_created_by_bot" | grep -qFx "$label"; then
                    labels_to_remove="${labels_to_remove:+$labels_to_remove,}$label"
                    branches_to_remove="${branches_to_remove:+$branches_to_remove,}$branch"
                  fi
                fi
              done
              if [[ -n "$labels_to_remove" ]]; then
                comment_pr "$url" "The backport request for branch(es) $branches_to_remove has been removed from PR description. Removing label(s)...."
                gh pr edit "$url" --remove-label "$labels_to_remove"
                echo "Removed labels for branch(es) $labels_to_remove for $url" >> cherry_pick_scan.log
              fi
            done
          done
      displayName: cherry pick scanning
    - script: |
        set -ex
        [ -f cherry_pick_scan.log ] && cat cherry_pick_scan.log
      displayName: show cherry pick scanning result
      condition: always()
    