# scan the PR body to check if there is any backport request
# if yes, add label for the request, if the label already exists, do nothing; 
# if the backport request is removed from PR description but the label still exists, remove the label.

trigger: none
pr: none

schedules:
- cron: "11 */6 * * *"
  branches:
    include:
    - main
  always: true

parameters:
- name: repos
  type: string
  default: sonic-net/sonic-buildimage sonic-net/sonic-mgmt sonic-net/sonic-utilities sonic-net/sonic-swss sonic-net/sonic-sairedis sonic-net/sonic-swss-common sonic-net/sonic-dbsyncd sonic-net/sonic-gnmi sonic-net/sonic-host-services sonic-net/sonic-linkmgrd sonic-net/sonic-linux-kernel sonic-net/sonic-mgmt-common sonic-net/sonic-mgmt-framework sonic-net/sonic-platform-common sonic-net/sonic-platform-daemons sonic-net/sonic-py-swsssdk sonic-net/sonic-restapi sonic-net/sonic-snmpagent sonic-net/sonic-dhcp-relay sonic-net/sonic-dhcpmon sonic-net/sonic-dash-api sonic-net/sonic-dash-ha sonic-net/sonic-bmp sonic-net/sonic-ztp
jobs:
- job: PRChecker
  pool: sonic-ubuntu-1c
  variables:
    - group: sonicbld
  timeoutInMinutes: 60
  steps:
    - script: |
        set -ex
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh jq -y

        echo $TOKEN | gh auth login --with-token
      env:
        TOKEN: $(GITHUB-TOKEN)
      displayName: install dependencies
    - script: |
        set -e
        date_3d_ago=$(date --date "3 days ago" -u +"%Y-%m-%d")

        comment_watermark='<div align="right"><sub>---Powered by SONiC BuildBot</sub></div>'
        comment_pr() {
          local pr_url=$1
          local comment_body=$2
          local full_body=$(printf "%s\n\n%s" "$comment_body" "$comment_watermark")
          gh pr comment "$pr_url" --body "$full_body"
        }
        repos="${{ parameters.repos }}"
        rm -rf cherry_pick_scan.log
        rc=0
        for repo in $repos $(EXTRA_REPOS); do
          echo ======== working for $repo ========
          echo ======= Result for $repo ====== >> cherry_pick_scan.log
          prs=$(gh pr list -R "$repo" --state all -L 300 --search "updated:>=$date_3d_ago -author:mssonicbld" --json url,labels,body,author,updatedAt)
          c=$(echo $prs | jq length)
          for ((i=0; i<$c; i++)); do
            set +x
            pr=$(echo $prs | jq .[$i])
            echo "Processing PR: $(echo $pr | jq .url -r)"
            url=$(echo $pr | jq .url -r)
            body=$(echo $pr | jq .body -r)
            body_no_comments=$(echo "$body" | awk 'BEGIN{in_comment=0} /<!--/{in_comment=1} !in_comment{print} /-->/{in_comment=0}')
            labels=$(echo $pr | jq .labels[].name -r)
            backport_section=$(echo "$body_no_comments" | awk 'tolower($0) ~ /^#{3,}.*?(backport|back port)/{found=1; next} found && /^#{3,}/{exit} found{print}')
            backport_branches=$(echo "$backport_section" | grep -oP '^\s*(?:-\s*\[[xX]\]\s*)?\K\d{6}(?=\s*$)' || true)
            echo "Found backport branches: $backport_branches"
            labels_to_add=""
            branches_to_add=""
            branches_already_added=""
            while IFS= read -r branch; do
              [[ -z "$branch" ]] && continue
              branch_label="$branch"
              if ! [[ "$branch" =~ (05|11)$ ]]; then
                branch_label="msft-$branch"
              fi
              label="Request for $branch_label Branch"
              if echo "$labels" | grep -qiF "$label"; then
                branches_already_added="${branches_already_added:+$branches_already_added,}$branch_label"
              elif echo "$labels" | grep -qiF "Included in $branch_label Branch" || echo "$labels" | grep -qiF "Created PR to $branch_label Branch"; then
                continue
              else
                labels_to_add="${labels_to_add:+$labels_to_add,}$label"
                branches_to_add="${branches_to_add:+$branches_to_add,}$branch_label"
              fi
            done <<< "$backport_branches"
            if [[ -n "$branches_to_add" ]]; then
              all_branches=$(echo "$backport_branches" | paste -sd ',' -)
              msg="This PR has backport request for branch(es): $all_branches."
              [[ -n "$branches_already_added" ]] && msg="$msg<br><br>Request label(s) for branch(es) $branches_already_added already exists."
              if gh pr edit "$url" --add-label "$labels_to_add"; then
                labels_added_now=$(echo "$labels_to_add" | tr ',' '\n')
                labels=$(printf "%s\n%s\n" "$labels" "$labels_added_now" | sed '/^$/d' | sort -fu)
                msg="$msg<br>Added label(s) for branch(es) $branches_to_add."
                comment_pr "$url" "$msg"
                echo "Added labels for branch(es) $branches_to_add for $url" >> cherry_pick_scan.log
              else
                echo "Failed to add label(s) for branch(es) $branches_to_add for $url" >> cherry_pick_scan.log
              fi
            fi
            pr_number=$(echo "$url" | grep -Eo '[0-9]+$')
            bot_created_labels=$(gh api "repos/$repo/issues/$pr_number/events?per_page=100" --paginate | jq -r '.[] | select(.event == "labeled" and (.actor.login // "") == "mssonicbld" and (.label.name // "" | test("^(Request|Tested) for (msft-)?[0-9]{6} Branch$"))) | .label.name' | sort -u)
            request_labels_created_by_bot=$(echo "$bot_created_labels" | grep -P '^Request for ' || true)
            tested_labels_created_by_bot=$(echo "$bot_created_labels" | grep -P '^Tested for ' || true)
            branches_with_request_label=$(echo "$labels" | grep -oP '(?<=Request for )(?:msft-)?\d{6}(?= Branch)' || true)
            labels_to_remove=""
            branches_to_remove=""
            for branch in $branches_with_request_label; do
              raw_branch=${branch#msft-}
              if ! echo "$backport_branches" | grep -qiF "$raw_branch"; then
                label="Request for $branch Branch"
                if echo "$request_labels_created_by_bot" | grep -qiFx "$label"; then
                  labels_to_remove="${labels_to_remove:+$labels_to_remove,}$label"
                  branches_to_remove="${branches_to_remove:+$branches_to_remove,}$branch"
                  tested_label="Tested for $branch Branch"
                  if echo "$labels" | grep -qiF "$tested_label"; then
                    if echo "$tested_labels_created_by_bot" | grep -qiFx "$tested_label"; then
                      labels_to_remove="${labels_to_remove:+$labels_to_remove,}$tested_label"
                    fi
                  fi
                fi
              fi
            done
            if [[ -n "$labels_to_remove" ]]; then
              if gh pr edit "$url" --remove-label "$labels_to_remove"; then
                while IFS= read -r removed_label; do
                  [[ -z "$removed_label" ]] && continue
                  labels=$(echo "$labels" | grep -vFx "$removed_label" || true)
                done <<< "$(echo "$labels_to_remove" | tr ',' '\n')"
                comment_pr "$url" "The backport request for branch(es) $branches_to_remove has been removed from PR description. Removed label(s)...."
                echo "Removed labels for branch(es) $labels_to_remove for $url" >> cherry_pick_scan.log
              else
                echo "Failed to remove label(s) for branch(es) $branches_to_remove for $url" >> cherry_pick_scan.log
              fi
            fi
            # Check Tested branch and Test result sections for PRs with backport request labels
            current_request_labels=$(echo "$labels" | grep -iP 'Request for (?:msft-)?\d{6} Branch' || true)
            if [[ -n "$current_request_labels" ]]; then
              tested_section=$(echo "$body_no_comments" | awk 'tolower($0) ~ /^#{3,}.*tested branch/{found=1; next} found && /^#{3,}/{exit} found{print}')
              tested_branches_checked=$(echo "$tested_section" | grep -oiP '^\s*-\s*\[[xX]\]\s*\K\S+' | grep -viF 'N/A' || true)
              test_result_section=$(echo "$body_no_comments" | awk 'tolower($0) ~ /^#{3,}.*test result/{found=1; next} found && /^#{3,}/{exit} found{print}')
              test_result_content=$(echo "$test_result_section" | sed '/^\s*$/d' || true)
              labels_to_add_tested=""
              labels_to_remove_tested=""
              missing_tested_for=""
              while IFS= read -r req_label; do
                [[ -z "$req_label" ]] && continue
                branch=$(echo "$req_label" | grep -oP '(?<=Request for )(?:msft-)?\d{6}(?= Branch)')
                raw_branch=${branch#msft-}
                tested_label="Tested for $branch Branch"
                if echo "$labels" | grep -qiF "$tested_label"; then
                  if ! (echo "$tested_branches_checked" | grep -qiF "$raw_branch" && echo "$test_result_content" | grep -qF "$raw_branch"); then
                    if echo "$tested_labels_created_by_bot" | grep -qiFx "$tested_label"; then
                      labels_to_remove_tested="${labels_to_remove_tested:+$labels_to_remove_tested,}$tested_label"
                    fi
                  fi
                  continue
                fi
                if echo "$tested_branches_checked" | grep -qiF "$raw_branch" && echo "$test_result_content" | grep -qF "$raw_branch"; then
                  labels_to_add_tested="${labels_to_add_tested:+$labels_to_add_tested,}$tested_label"
                else
                  missing_tested_for="${missing_tested_for:+$missing_tested_for,}$branch"
                fi
              done <<< "$current_request_labels"
              if [[ -n "$labels_to_add_tested" ]]; then
                if gh pr edit "$url" --add-label "$labels_to_add_tested"; then
                  labels_added=$(echo "$labels_to_add_tested" | tr ',' '\n')
                  labels=$(printf "%s\n%s\n" "$labels" "$labels_added" | sed '/^$/d' | sort -fu)
                  tested_branches_list=$(echo "$labels_to_add_tested" | grep -oP '(?<=Tested for )(?:msft-)?\d{6}(?= Branch)' | paste -sd ',' -)
                  comment_pr "$url" "The **Tested branch** section has been ticked and **Test result** is provided for branch(es): $tested_branches_list. Added label(s): $labels_to_add_tested."
                  echo "Added tested label(s) for $url: $labels_to_add_tested" >> cherry_pick_scan.log
                else
                  existing_failure_comments=$(gh api "repos/$repo/issues/$pr_number/comments" --jq '[.[] | select(.user.login == "mssonicbld" and (.body | test("Failed to add tested label"; "i")))] | length' 2>/dev/null || echo "0")
                  if [[ "$existing_failure_comments" == "0" ]]; then
                    comment_pr "$url" "@yijingyan2 @lunyue-ms Failed to add tested label(s): $labels_to_add_tested. The label(s) may not exist. Please check manually."
                  fi
                  echo "Failed to add tested label(s) for $url: $labels_to_add_tested" >> cherry_pick_scan.log
                fi
              fi
              if [[ -n "$labels_to_remove_tested" ]]; then
                if gh pr edit "$url" --remove-label "$labels_to_remove_tested"; then
                  removed_tested_branches=$(echo "$labels_to_remove_tested" | grep -oP '(?<=Tested for )(?:msft-)?\d{6}(?= Branch)' | paste -sd ',' -)
                  comment_pr "$url" "The **Tested branch** tick or **Test result** has been removed for branch(es): $removed_tested_branches. Removed label(s): $labels_to_remove_tested."
                  echo "Removed tested label(s) for $url: $labels_to_remove_tested" >> cherry_pick_scan.log
                else
                  echo "Failed to remove tested label(s) for $url: $labels_to_remove_tested" >> cherry_pick_scan.log
                fi
              fi
              if [[ -n "$missing_tested_for" ]]; then
                existing_missing_comment_bodies=$(gh api "repos/$repo/issues/$pr_number/comments" --jq '[.[] | select(.user.login == "mssonicbld" and (.body | test("missing required test information"; "i"))) | .body] | join("\n")' 2>/dev/null || echo "")
                uncovered_branches=""
                while IFS= read -r mb; do
                  [[ -z "$mb" ]] && continue
                  raw_mb=${mb#msft-}
                  if ! echo "$existing_missing_comment_bodies" | grep -qF "$raw_mb"; then
                    uncovered_branches="${uncovered_branches:+$uncovered_branches,}$mb"
                  fi
                done <<< "$(echo "$missing_tested_for" | tr ',' '\n')"
                if [[ -n "$uncovered_branches" ]]; then
                  first_branch=$(echo "$uncovered_branches" | cut -d',' -f1)
                  raw_first_branch=${first_branch#msft-}
                  missing_msg="This PR has backport request label(s) for branch(es): $uncovered_branches, but is missing required test information. Please make sure you tick the tested branch(es) in the **Tested branch** section and provide test evidence (e.g., $raw_first_branch: &lt;test result&gt;) in the **Test result** section as well in your PR description."
                  comment_pr "$url" "$missing_msg"
                  echo "Left comment about missing test info for $url" >> cherry_pick_scan.log
                fi
              fi
            fi
          done
        done
      displayName: PR description scanning
    - script: |
        set -ex
        [ -f cherry_pick_scan.log ] && cat cherry_pick_scan.log
      displayName: show PR description scanning result
      condition: always()
    - script: |
        set -ex
        rm -f workflow_scan.log
        comment_watermark='<div align="right"><sub>---Powered by SONiC BuildBot</sub></div>'
        comment_pr() {
          local pr_url=$1
          local comment_body=$2
          local full_body=$(printf "%s\n\n%s" "$comment_body" "$comment_watermark")
          gh pr comment "$pr_url" --body "$full_body"
        }
        repos="${{ parameters.repos }}"
        for repo in $repos $(EXTRA_REPOS); do
          echo ======== checking waiting workflow runs for $repo ========
          repo_maintainer=${repo}-maintainer
          waiting_runs=$(gh run list -R "$repo" --status action_required --json name,headSha --jq '.[] | select(.name == "CodeQL" or .name == "Semgrep") | .headSha' | sort -u)
          for run in $waiting_runs; do
            pr_info=$(gh pr list -R "$repo" --search "$run" --state open --json url,comments,reviewDecision,headRefOid --jq '.[0] // empty')
            if [[ -n "$pr_info" ]]; then
              pr_url=$(printf '%s' "$pr_info" | jq -r .url)
              pr_head_sha=$(printf '%s' "$pr_info" | jq -r .headRefOid)
              if [[ "$run" != "$pr_head_sha" ]]; then
                echo "Workflow run $run is not the latest commit ($pr_head_sha) for $pr_url, skipping..." >> workflow_scan.log
                continue
              fi
              pr_comments=$(printf '%s' "$pr_info" | jq -c .comments)
              pr_review_decision=$(printf '%s' "$pr_info" | jq -r .reviewDecision)
              if [[ "$pr_review_decision" == "APPROVED" ]]; then
                comment_pr "$pr_url" "Hi @$repo_maintainer, this approved PR has workflow run(s) waiting for approval. Please help review. Thanks!"
                echo "Approved PR $pr_url has workflow run $run waiting for approval, left comment to notify maintainers." >> workflow_scan.log
                continue
              fi
              pending_msg="Hi, there are workflow run(s) waiting for approval, you may be first-time contributor. I will notify maintainers to help approve once PR is approved. Thanks!"
              if echo "$pr_comments" | jq -e '.[]? | select(((.author.login // "") == "mssonicbld") and ((.body // "") | test("workflow run\\(s\\) waiting for approval"; "i")))' > /dev/null; then
                echo "Already commented about waiting workflow run for $pr_url, skipping..." >> workflow_scan.log
              else
                comment_pr "$pr_url" "$pending_msg"
                echo "Left comment to notify contributor for $pr_url about waiting workflow run(s)." >> workflow_scan.log
              fi
            fi
          done
        done
      displayName: scan for action required workflows
      condition: always()
    - script: |
        set -ex
        [ -f workflow_scan.log ] && cat workflow_scan.log
      displayName: show action required workflow scanning result
      condition: always()
    